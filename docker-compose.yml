services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_setor_eletrico
    ports:
      - "6333:6333" # Porta principal da API REST
      - "6334:6334" # Porta para gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333

  api:
    build: .
    container_name: rag_api_setor_eletrico
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - QDRANT_URL=http://qdrant:6333
    env_file:
      - .env
    depends_on:
      - qdrant
    command: uvicorn app.api:app --host 0.0.0.0 --port 8000
    volumes:
      - ./data:/app/data
    restart: unless-stopped

volumes:
  qdrant_data:
    name: qdrant_storage