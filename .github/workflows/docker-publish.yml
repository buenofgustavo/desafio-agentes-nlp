name: Build and Publish Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push UI Image
        run: |
          docker build -t braziel2004/aneel-ui:latest -f Dockerfile.ui .
          docker push braziel2004/aneel-ui:latest

      - name: Build and Push API Image
        run: |
          docker build -t braziel2004/aneel-api:latest -f Dockerfile.api .
          docker push braziel2004/aneel-api:latest
